<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3b82f6">
    <title>Windy Cloud</title>
    <link rel="manifest" href="/static/manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .pillars {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .pillar {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 1.5rem;
            width: 160px;
        }
        .pillar h3 {
            font-size: 1rem;
            margin-bottom: 0.25rem;
            color: #f1f5f9;
        }
        .pillar span {
            font-size: 0.85rem;
            color: #64748b;
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            color: #3b82f6;
            text-decoration: none;
            margin: 0 0.75rem;
            font-size: 0.9rem;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Windy Cloud</h1>
        <p>Your digital life, unified.</p>
        <div class="pillars">
            <div class="pillar">
                <h3>Storage</h3>
                <span>R2 cold storage</span>
            </div>
            <div class="pillar">
                <h3>Compute</h3>
                <span>GPU speech-to-text</span>
            </div>
            <div class="pillar">
                <h3>Servers</h3>
                <span>VPS hosting</span>
            </div>
        </div>
        <div class="links">
            <a href="/health">Health</a>
            <a href="/api/v1/status">Status</a>
        </div>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/static/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
