name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'deploy/**'
      - 'Dockerfile'
      - 'pyproject.toml'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image repo name
        # GHCR / Docker registry v2 rejects uppercase characters in image names.
        # github.repository is literal case (sneakyfree/WindyCloud) — lowercase it
        # into IMAGE_REPO for the tags below. Shell parameter-expansion ${V,,}.
        run: echo "IMAGE_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_REPO }}:latest
            ghcr.io/${{ env.IMAGE_REPO }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to AWS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/windy-cloud
            docker compose pull
            docker compose up -d
            docker image prune -f
            # Verify health
            sleep 5
            curl -sf http://localhost:8200/health || echo "WARNING: health check failed"
            echo "Deployed $(docker inspect --format='{{.Image}}' windy-cloud-cloud-1 | cut -c8-19)"
