name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/ruff check api/
      - run: .venv/bin/ruff format --check api/

  test:
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/python -m pytest api/tests/ -v --tb=short

  docker:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t windy-cloud:ci .

      - name: Start container and verify health
        run: |
          docker run -d --name cloud-ci -p 8200:8200 -e USE_MOCK_PROVIDERS=true windy-cloud:ci
          sleep 3
          STATUS=$(curl -sf http://localhost:8200/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "Health status: $STATUS"
          [ "$STATUS" = "ok" ] || exit 1
          docker stop cloud-ci

  migrations:
    # Marathon Foundation #7 — alembic round-trip against real Postgres.
    # Catches broken downgrade() implementations at PR time. See
    # ~/kit-army-config/docs/marathon-foundations-program-2026-05-11.md §MF7.
    runs-on: [self-hosted, linux, x64]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: cloud
          POSTGRES_DB: cloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql+asyncpg://cloud:cloud@localhost:5432/cloud"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - name: Migration round-trip (upgrade head → downgrade -1 → upgrade head)
        run: |
          set -euo pipefail
          echo "──── Step 1: upgrade head ────"
          .venv/bin/alembic upgrade head
          echo "──── Step 2: downgrade -1 ────"
          .venv/bin/alembic downgrade -1
          echo "──── Step 3: upgrade head again ────"
          .venv/bin/alembic upgrade head
          echo "✅ Migration reversibility verified"
