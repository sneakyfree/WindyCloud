name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/ruff check api/
      - run: .venv/bin/ruff format --check api/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/python -m pytest api/tests/ -v --tb=short
