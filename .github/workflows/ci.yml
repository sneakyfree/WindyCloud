name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/ruff check api/
      - run: .venv/bin/ruff format --check api/

  test:
    runs-on: [self-hosted, linux, x64]
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv --python ${{ matrix.python-version }}
      - run: uv pip install -e ".[dev]"
      - run: .venv/bin/python -m pytest api/tests/ -v --tb=short

  docker:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t windy-cloud:ci .

      - name: Start container and verify health
        run: |
          # Shared self-hosted box: remove any leftover container from an
          # aborted run (the name is global), and bind a high, repo-unique
          # host port so we never race resident containers for 8200.
          docker rm -f cloud-ci 2>/dev/null || true
          docker run -d --name cloud-ci -p 18200:8200 -e USE_MOCK_PROVIDERS=true windy-cloud:ci
          STATUS=""
          for i in $(seq 1 10); do
            sleep 3
            STATUS=$(curl -sf http://localhost:18200/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])" || true)
            [ "$STATUS" = "ok" ] && break
          done
          echo "Health status: $STATUS"
          if [ "$STATUS" != "ok" ]; then
            docker logs cloud-ci || true
            exit 1
          fi

      - name: Cleanup container
        if: always()
        run: docker rm -f cloud-ci 2>/dev/null || true

  migrations:
    # Marathon Foundation #7 — alembic round-trip against real Postgres.
    # Catches broken downgrade() implementations at PR time. See
    # ~/kit-army-config/docs/marathon-foundations-program-2026-05-11.md §MF7.
    runs-on: [self-hosted, linux, x64]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloud
          POSTGRES_PASSWORD: cloud
          POSTGRES_DB: cloud
        ports:
          # Kit 0 is a shared box: host 5432 is contended (resident
          # containers + other repos' CI services), so bind a high,
          # repo-unique host port. FissionClips CI uses 25432.
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U cloud"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: "postgresql+asyncpg://cloud:cloud@localhost:15432/cloud"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv venv .venv
      - run: uv pip install -e ".[dev]"
      - name: Migration round-trip (upgrade head → downgrade -1 → upgrade head)
        run: |
          set -euo pipefail
          echo "──── Step 1: upgrade head ────"
          .venv/bin/alembic upgrade head
          echo "──── Step 2: downgrade -1 ────"
          .venv/bin/alembic downgrade -1
          echo "──── Step 3: upgrade head again ────"
          .venv/bin/alembic upgrade head
          echo "✅ Migration reversibility verified"
