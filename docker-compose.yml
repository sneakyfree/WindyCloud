services:
  cloud:
    build: .
    ports:
      - "8200:8200"
    env_file:
      - .env
    volumes:
      - cloud-data:/app/data
      - ./api:/app/api  # Dev hot-reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  cloud-data:
