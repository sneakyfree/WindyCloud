services:
  cloud:
    build: .
    ports:
      - "8200:8200"
    env_file:
      - .env
    volumes:
      - cloud-data:/app/data  # SQLite DB + local file storage persist here
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
  # adds ./api:/app/api for hot-reload

volumes:
  cloud-data:
    driver: local
