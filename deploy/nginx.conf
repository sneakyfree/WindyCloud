upstream windy_cloud {
    server 127.0.0.1:8200;
}

server {
    listen 80;
    server_name cloud.windyfly.ai cloud.thewindstorm.uk;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cloud.windyfly.ai cloud.thewindstorm.uk;

    ssl_certificate /etc/letsencrypt/live/cloud.windyfly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.windyfly.ai/privkey.pem;

    client_max_body_size 1G;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://windy_cloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket support (future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for large uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check (no rate limit, no auth)
    location /health {
        proxy_pass http://windy_cloud/health;
        access_log off;
    }
}
