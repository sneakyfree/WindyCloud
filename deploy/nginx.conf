upstream windy_cloud {
    server 127.0.0.1:8200;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name cloud.windyfly.ai windycloud.com;

    # Allow ACME challenge for cert renewal
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cloud.windyfly.ai windycloud.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/cloud.windyfly.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cloud.windyfly.ai/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    client_max_body_size 1G;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    location / {
        proxy_pass http://windy_cloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Websocket support (future)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts for large uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check (no rate limit, no auth)
    location /health {
        proxy_pass http://windy_cloud/health;
        access_log off;
    }
}
